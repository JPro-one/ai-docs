subprojects {
    group = 'one.jpro.platform'
    version = '0.1.0-SNAPSHOT'

    apply plugin: 'java'

    java {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    repositories {
        mavenCentral()
        gradlePluginPortal()
    }

    test {
        useJUnitPlatform()
    }
}
