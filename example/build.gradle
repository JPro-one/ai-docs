plugins {
    id 'java'
    id 'one.jpro.platform.ai-docs' version '0.1.0-SNAPSHOT'
}

repositories {
    mavenCentral()
    maven {
        url "https://sandec.jfrog.io/artifactory/repo"
    }
}

dependencies {
    implementation 'one.jpro.platform:jpro-routing-core:0.5.8'
    implementation 'one.jpro.platform:jpro-file:0.5.8'
    implementation 'one.jpro:jpro-webapi:2026.1.1'
    implementation 'one.jpro:jpro:2026.1.1'
}
